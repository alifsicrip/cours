,32"}},{"content":"<strong>Dimensions symboliques &#x1f9ff;</strong> : nourriture associ&#xe9;e &#xe0; des valeurs morales, &#xe0; l&#x2019;id&#xe9;e de sant&#xe9; ou au statut social","children":[],"payload":{"tag":"li","lines":"32,34"}}],"payload":{"tag":"h3","lines":"30,31"}},{"content":"&#x1f4cc; 2.2 Diversit&#xe9; des pratiques alimentaires","children":[{"content":"<strong>R&#xe9;gimes culturels</strong> : v&#xe9;g&#xe9;tarisme, halal, casher, pratiques locales sp&#xe9;cifiques","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"<strong>Imaginaires nutritionnels</strong> : repr&#xe9;sentation mentale et sociale du &#xab; bien manger &#xbb;","children":[],"payload":{"tag":"li","lines":"36,38"}}],"payload":{"tag":"h3","lines":"34,35"}},{"content":"&#x1f34e; 2.3 Culture et choix alimentaires","children":[{"content":"La cuisine :","children":[{"content":"ensemble &#xe9;labor&#xe9; qui met en lien des produits de base (pour respecter une notion de di&#xe9;t&#xe9;tique)","children":[{"content":"syst&#xe8;me d&apos;arrangement selon des crit&#xe8;res : couleurs, textures, secs ou en sauce, odeurs, des fa&#xe7;ons de couper-d&#xe9;couper-assembler...","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"comme lieu d&apos;&#xe9;laboration et comme lieu de repas","children":[],"payload":{"tag":"li","lines":"42,43"}}],"payload":{"tag":"li","lines":"40,43"}},{"content":"Privation (choisi, comme rebellion, subit)","children":[],"payload":{"tag":"li","lines":"43,44"}}],"payload":{"tag":"li","lines":"39,44"}},{"content":"<strong>Normes culturelles</strong> : ce qui est autoris&#xe9;/interdit, per&#xe7;u comme bon ou dangereux","children":[{"content":"&#x2192; Ex: aliments rituels religieux ou tabous alimentaires (souillures, contamination)","children":[],"payload":{"tag":"li","lines":"45,46"}}],"payload":{"tag":"li","lines":"44,46"}},{"content":"<strong>Valeurs sociales</strong> : groupes, classes sociales et repas familiaux influencent les habitudes","children":[],"payload":{"tag":"li","lines":"46,48"}}],"payload":{"tag":"h3","lines":"38,39"}},{"content":"&#x1f38e; 2.4 Symbolisme des repas","children":[{"content":"Le repas est un <strong>rituel social</strong> (famille, f&#xea;te, hospitalisation)","children":[],"payload":{"tag":"li","lines":"49,50"}},{"content":"Partager un repas = renforcer des <strong>liens sociaux</strong> et des <strong>identit&#xe9;s culturelles</strong>. Copain = Cum (avec) Pane (pain)","children":[{"content":"Donc peut-&#xea;tre un moment de discrimination (classe, religieuse, genre...), d&apos;exclusion ou de choix de solitude","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"Donner -&gt; J&apos;invite / Recevoir -&gt; Engage / Rendre -&gt; Dette","children":[],"payload":{"tag":"li","lines":"52,54"}}],"payload":{"tag":"li","lines":"50,54"}}],"payload":{"tag":"h3","lines":"48,49"}},{"content":"&#x1f9e0; 2.5 Repr&#xe9;sentations et imaginaires","children":[{"content":"&#xab; Bien manger &#xbb; est influenc&#xe9; par des <strong>repr&#xe9;sentations sociales de sant&#xe9;</strong> (ex: r&#xe9;gime, naturel/id&#xe9;al)","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"L&#x2019;alimentation v&#xe9;hicule des <strong>valeurs morales</strong> et des croyances sur le corps","children":[],"payload":{"tag":"li","lines":"56,58"}}],"payload":{"tag":"h3","lines":"54,55"}},{"content":"&#x1f4ca; 2.6 Evolution chronologique dans l&apos;histoire (ontogen&#xe8;se)","children":[{"content":"Nous avons d&apos;abord mang&#xe9; avec la &quot;gueule&quot; &#xe0; 4 pattes","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"La verticalisation nous a permis la M&#xe9;moire, la Vocalisation et la Lib&#xe9;ration des mains","children":[],"payload":{"tag":"li","lines":"60,62"}}],"payload":{"tag":"h3","lines":"58,59"}}],"payload":{"tag":"h2","lines":"28,29"}},{"content":"&#x1f9d1;&#x200d;&#x2695;&#xfe0f; 3) Anthropologie et pratique infirmi&#xe8;re","children":[{"c ","children":[],"payload":{"tag":"li","lines":"83,85"}}],"payload":{"tag":"h3","lines":"81,82"}},{"content":"&#x1f9ea; 4.2 Anthropologie et pr&#xe9;vention","children":[{"content":"Importance de comprendre les croyances pour &#xe9;laborer <strong>messages &#xe9;ducatifs efficaces</strong>","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"&#xc9;viter les jugements moralistes sur les habitudes alimentaires &#x2014; promouvoir l&#x2019;&#xe9;coute","children":[],"payload":{"tag":"li","lines":"87,89"}}],"payload":{"tag":"h3","lines":"85,86"}}],"payload":{"tag":"h2","lines":"80,81"}},{"content":"&#x1f4d8; 5) Notions &#xe0; conna&#xee;tre","children":[{"content":"&#x1f9e0; 5.1","children":[{"content":"Culture, norme, rituel, symbolisme alimentaire","children":[],"payload":{"tag":"li","lines":"94,95"}},{"content":"Identit&#xe9; alimentaire et rapport au corps","children":[],"payload":{"tag":"li","lines":"95,96"}},{"content":"Diff&#xe9;rences <em>bioculturelles</em> dans les pratiques alimentaires","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"Associer chaque concept avec <strong>un exemple de situation clinique r&#xe9;elle</strong>","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"Relier les notions anthropologiques &#xe0; la <strong>communication avec le&#xb7;la patient&#xb7;e</strong>","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"Culture &#x2192; croyances &#x2192; pratique &#x2192; implication soins","children":[],"payload":{"tag":"li","lines":"99,101"}}],"payload":{"tag":"h3","lines":"93,94"}},{"content":"&#x1f4d8; 5.2 - Liens avec les autres disciplines du semestre","children":[{"content":"<strong>Psychologie sociale</strong> (repr&#xe9;sentations, groupe, identit&#xe9;)","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"<strong>Sociologie des pratiques alimentaires</strong>","children":[],"payload":{"tag":"li","lines":"104,105"}},{"content":"<strong>Sant&#xe9; publique</stron "124,125","listIndex":1}},{"content":"2. Relier ces &#xe9;l&#xe9;ments aux <strong>besoins de soins infirmiers</strong> du/de la patient.e : nutrition, respect des croyances, inclusion","children":[],"payload":{"tag":"li","lines":"125,126","listIndex":2}},{"content":"3. D&#xe9;crire des <strong>strat&#xe9;gies de prise en charge adapt&#xe9;es</strong>","children":[],"payload":{"tag":"li","lines":"126,128","listIndex":3}}],"payload":{"tag":"h3","lines":"123,124"}},{"content":"&#x1f50e; 6.2 Exemples types d&#x2019;interrogations","children":[{"content":"Pourquoi un patient refuse-t-il un aliment sp&#xe9;cifique ?","children":[],"payload":{"tag":"li","lines":"129,130"}},{"content":"Comment adapter un plan de soins prenant en compte des pratiques culturelles ?","children":[],"payload":{"tag":"li","lines":"130,131"}},{"content":"Quelle importance des rituels du repas dans le soin ?","children":[],"payload":{"tag":"li","lines":"131,133"}}],"payload":{"tag":"h3","lines":"128,129"}},{"content":"&#x1f4dd; Exemples de sujets d&#x2019;examen","children":[{"content":"R&#xf4;le de la culture dans les pr&#xe9;f&#xe9;rences alimentaires d&#x2019;un&#xb7;e patient&#xb7;e","children":[],"payload":{"tag":"li","lines":"134,135"}},{"content":"Comment accompagner une personne qui refuse certains aliments pour des raisons religieuses","children":[],"payload":{"tag":"li","lines":"135,136"}},{"content":"Impact des repr&#xe9;sentations sociales de l&#x2019;alimentation sur la compliance au traitement","children":[],"payload":{"tag":"li","lines":"136,138"}}],"payload":{"tag":"h3","lines":"133,134"}}],"payload":{"tag":"h2","lines":"121,122"}},{"content":"&#x1f3af; &#x1f449; Comprendre comment les <strong>comportements alimentaires ont &#xe9;volu&#xe9;</strong> chez les humains (et leurs anc&#xea;tres), du mode de subsistance ancestral aux syst&#xe8;mes alimentaires complexes actuels, en articulant les <strong>forces biologiques, &#xe9;cologiques et socio-culturelles</strong>","children":[],"payload":{"tag":"h2","lines":"140,141"}},{"content":"&#x1f9ec; 1) Origines &#xe9;volutives &#x2013; premiers hominid&#xe9;s","children":[{"content":"&#x23f3; 1.1 Alimentation des hominid&#xe9;s avant Homo","children":[{"content":"Avant la lign&#xe9;e <em>Homo</em>, nos anc&#xea;tres consommaient un <strong>r&#xe9;gime omnivore opportuniste</strong> (fruits, feuilles, insectes, racines)","children":[],"payload":{"tag":"li","lines":"147,148"}},{"content":"L&#x2019;usage de <strong>outils lithiques</strong> marque l&#x2019;incorporation de nouvelles sources alimentaires comme le <strong>viande et la moelle d&#x2019;os</strong> il y a plusieurs millions d&#x2019;ann&#xe9;es","children":[],"payload":{"tag":"li","lines":"148,150"}}],"payload":{"tag":"h3","lines":"146,147"}},{"content":"&#x1f525; 1.2 Ma&#xee;trise du feu et cuisson","children":[{"content":"La <strong>cuisson des aliments</strong> est un tournant &#xe9;volutif majeur &#x2014; elle augmente la digestibilit&#xe9; et l&#x2019;<strong>&#xe9;nergie disponible</strong>, facilitant <strong>l&#x2019;expansion c&#xe9;r&#xe9;brale</strong> et <strong>r&#xe9;duisant les temps d&#x2019;alimentation</strong>","children":[],"payload":{"tag":"li","lines":"151,152"}},{"content":"Chez <em>Homo erectus</em>, la cuisson aurait &#xe9;t&#xe9; un facteur cl&#xe9; de d&#xe9;veloppement biologique et social","children":[],"payload":{"tag":"li","lines":"152,154"}}],"payload":{"tag":"h3","lines":"150,151"}}],"payload":{"tag":"h2","lines":"144,145"}},{"content":"&#x1f30d; 2) Homo sapiens et chasse-cueillette","children":[{"content":"&#x1f6d6; 2.1 Mode de subsistance pal&#xe9;olithique","children":[{"content":"<em>Homo sapiens</em> et contemporains (n&#xe9;andertaliens inclus) pratiquent la <strong>chasse, la p&#xea;che et la cueillette</strong> avec de fortes variations r&#xe9;gionales","children":[],"payload":{"tag":"li","lines":"159,160"}},{"content":"Les donn&#xe9;es isotopiques montrent que les N&#xe9;andertaliens consommaient une importante proportion d&#x2019;aliments d&#x2019;origine animale, mais aussi une diversit&#xe9; de v&#xe9;g&#xe9;taux selon les environnements","children":[],"payload":{"tag":"li","lines":"160,162"}}],"payload":{"tag":"h3","lines":"158,159"}},{"content":"&#x1f4cc; 2.2 Sociabilit&#xe9; alimentaire","children":[{"content":"Les repas sont des <strong>moments sociaux structur&#xe9;s</strong>, impliquant partage, coop&#xe9;ration et rites, bien au-del&#xe0; de la simple subsistance. Autour du feu","children":[],"payload":{"tag":"li","lines":"163,165"}}],"payload":{"tag":"h3","lines":"162,163"}}],"payload":{"tag":"h2","lines":"156,157"}},{"content":"&#x1f33e; 3) R&#xe9;volution n&#xe9;olithique &#x2013; agriculture et &#xe9;levage","children":[{"content":"&#x1f69c; 3.1 Premi&#xe8;res domestications","children":[{"content":"Il y a ~12 000 ans, en <strong>Moyen-Orient puis en Europe</strong>, les populations passent de la chasse-cueillette &#xe0; <strong>l&#x2019;agriculture</strong> (c&#xe9;r&#xe9;ales, l&#xe9;gumineuses) et &#xe0; l&#x2019;<strong>&#xe9;levage</strong>","children":[],"payload":{"tag":"li","lines":"170,171"}},{"content":"Ce tournant transforme profond&#xe9;ment les <strong>habitudes alimentaires, la s&#xe9;dentarisation et les structures sociales</strong>, favorisant l&#x2019;apparition de surplus, d&#x2019;in&#xe9;galit&#xe9;s et de sp&#xe9;cialisation alimentaire","children":[],"payload":{"tag":"li","lines":"171,173"}}],"payload":{"tag":"h3","lines":"169,170"}},{"content":"&#x1f9ec; 3.2 Adaptations biologiques et culturelles","children":[{"content":"Des adaptations g&#xe9;n&#xe9;tiques apparaissent (ex. <strong>lactase persistante</strong> chez certains groupes humains), reflet du <strong>coe&#x301;volution g&#xe8;ne-culture</strong>","children":[],"payload":{"tag":"li","lines":"174,175"}},{"content":"Les pratiques culturelles alimentaires se d&#xe9;veloppent : transformation des aliments, stockage, fermentation, cuisines r&#xe9;gionales","children":[],"payload":{"tag":"li","lines":"175,177"}}],"payload":{"tag":"h3","lines":"173,174"}}],"payload":{"tag":"h2","lines":"167,168"}},{"content":"&#x1f3d9;&#xfe0f; 4) Antiquit&#xe9; et soci&#xe9;t&#xe9;s historiques","children":[{"content":"&#x1f372; 4.1 Complexification des syst&#xe8;mes alimentaires","children":[{"content":"Dans l&#x2019;<strong>Antiquit&#xe9;</strong>, les pratiques alimentaires refl&#xe8;tent des hi&#xe9;rarchies sociales (banquets aristocratiques, aliments de prestige vs subsistance), des rituels religieux et des valeurs culturelles dominantes","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"Ex : en Gr&#xe8;ce et &#xe0; Rome, la cuisine devient un marqueur culturel, accompagn&#xe9;e de textes, recettes et discours normatifs","children":[],"payload":{"tag":"li","lines":"183,185"}}],"payload":{"tag":"h3","lines":"181,182"}},{"content":"&#x1f9e0; 4.2 &#xc9;changes et diffusion","children":[{"content":"Avec le commerce, les aliments, recettes et normes alimentaires voyagent, contribuant &#xe0; une <strong>diversit&#xe9; croissante des pratiques alimentaires</strong>","children":[],"payload":{"tag":"li","lines":"186,188"}}],"payload":{"tag":"h3","lines":"185,186"}}],"payload":{"tag":"h2","lines":"179,180"}},{"content":"&#x1f3ed; 5) &#xc9;poques moderne et contemporaine","children":[{"content":"&#x1f354; 5.1 Industrialisation","children":[{"content":"L&#x2019;essor de la production industrielle transforme les r&#xe9;gimes alimentaires : conserves, aliments transform&#xe9;s, marketing alimentaire","children":[],"payload":{"tag":"li","lines":"193,194"}},{"content":"Apparition de ph&#xe9;nom&#xe8;nes modernes tels que la <strong>malbouffe</strong>, reflet des <strong>mutations &#xe9;conomiques, urbanisation et in&#xe9;galit&#xe9;s sociales</strong>","children":[],"payload":{"tag":"li","lines":"194,196"}}],"payload":{"tag":"h3","lines":"192,193"}},{"content":"&#x1f310; 5.2 Mondialisation","children":[{"content":"Globalisation des go&#xfb;ts et hybridation des pratiques culinaires, mais aussi tensions identitaires autour des aliments et normes de sant&#xe9;","children":[],"payload":{"tag":"li","lines":"197,199"}}],"payload":{"tag":"h3","lines":"196,197"}}],"payload":{"tag":"h2","lines":"190,191"}},{"content":"&#x1f331; 6) Dimensions socio-culturelles de l&#x2019;histoire alimentaire","children":[{"content":"&#x1f37d;&#xfe0f; 6.1 Le fait alimentaire comme langage culturel","children":[{"content":"L&#x2019;alimentation structure les <strong>identit&#xe9;s, valeurs, symboles et normes sociales</strong> d&#x2019;une soci&#xe9;t&#xe9;, faisant du repas un acte social significatif","children":[],"payload":{"tag":"li","lines":"204,206"}}],"payload":{"tag":"h3","lines":"203,204"}},{"content":"&#x2696;&#xfe0f; 6.2 Hi&#xe9;rarchies et pratiques alimentaires","children":[{"content":"Tout au long de l&#x2019;histoire, les aliments et les fa&#xe7;ons de manger ont servi &#xe0; <strong>marquer des statuts sociaux</strong>, des appartenances religieuses et des fronti&#xe8;res culturelles","children":[],"payload":{"tag":"li","lines":"207,209"}}],"payload":{"tag":"h3","lines":"206,207"}}],"payload":{"tag":"h2","lines":"201,202"}},{"content":"&#x1f4cc; 7) Concepts cl&#xe9;s (visuels et mots-cl&#xe9;s)","children":[{"content":"&#x1f30d; <strong>&#xc9;volution alimentaire</strong> : chasse-cueillette &#x2192; agriculture &#x2192; industrialisation","children":[],"payload":{"tag":"li","lines":"213,214"}},{"content":"&#x1f525; <strong>Cuisson &amp; socialisation</strong>","children":[],"payload":{"tag":"li","lines":"214,215"}},{"content":"&#x1f9ec; <strong>Coe&#x301;volution g&#xe8;ne-culture</strong>","children":[],"payload":{"tag":"li","lines":"215,216"}},{"content":"&#x1f372; <strong>Rituels alimentaires &amp; identit&#xe9;</strong>","children":[],"payload":{"tag":"li","lines":"216,217"}},{"content":"&#x1f354; <strong>Globalisation &amp; malbouffe</strong>","children":[],"payload":{"tag":"li","lines":"217,219"}}],"payload":{"tag":"h2","lines":"211,212"}},{"content":"&#x1f9e0; 8) Enjeux anthropologiques pour les soignant&#xb7;e&#xb7;s","children":[{"content":"Comprendre que les pratiques alimentaires actuelles sont le <strong>produit d&#x2019;une histoire longue</strong>, fa&#xe7;onn&#xe9;e par des modes de subsistance, des valeurs sociales et des transformations culturelles","children":[],"payload":{"tag":"li","lines":"223,224"}},{"content":"Cette perspective aide &#xe0; <strong>analyser les comportements alimentaires des patients</strong> dans leurs d&#xe9;terminants historiques, culturels et symboliques","children":[],"payload":{"tag":"li","lines":"224,226"}}],"payload":{"tag":"h2","lines":"221,222"}},{"content":"&#x1f37d;&#xfe0f; Ontogen&#xe8;se des comportements alimentaires humains","children":[],"payload":{"tag":"h2","lines":"228,229"}},{"content":"&#x1f3af;&#x1f449; Comprendre comment les <strong>comportements alimentaires humains se construisent au cours du d&#xe9;veloppement individuel</strong>, en articulant des dimensions <strong>biologiques, cognitives, sociales et culturelles</strong>, pour &#xe9;clairer l&#x2019;accompagnement infirmier aupr&#xe8;s d&#x2019;enfants et de familles","children":[],"payload":{"tag":"h2","lines":"230,231"}},{"content":"&#x1f9e0; 1) Concept d&#x2019;ontogen&#xe8;se alimentaire","children":[{"content":"&#x1f4cd; 1.1 D&#xe9;finition","children":[{"content":"<strong>Ontogen&#xe8;se des comportements alimentaires</strong> : d&#xe9;veloppement progressif des fa&#xe7;ons de manger (choix d&#x2019;aliments, r&#xe9;gulation de la faim/sati&#xe9;t&#xe9;, attitudes face &#xe0; la nourriture) <em>au cours de la vie d&#x2019;un individu</em>","children":[],"payload":{"tag":"li","lines":"237,238"}},{"content":"Elle est <strong>pluridimensionnelle</strong> : elle implique des processus biologiques, sensoriels, cognitifs, affectifs et socio-culturels qui interagissent","children":[],"payload":{"tag":"li","lines":"238,240"}}],"payload":{"tag":"h3","lines":"236,237"}},{"content":"&#x1f9e0; 1.2 Importance dans l&#x2019;anthropologie","children":[{"content":"Int&#xe9;grer <strong>perspectives biologiques et sociales</strong> permet d&#x2019;expliquer comment <em>ce que l&#x2019;on mange</em> n&#x2019;est pas uniquement d&#xe9;termin&#xe9; par la physiologie mais aussi par les <strong>pratiques, normes, apprentissages et contextes sociaux</strong>","children":[],"payload":{"tag":"li","lines":"241,242"}},{"content":"Approche biopsychosociale essentielle en anthropologie des comportements alimentaires","children":[],"payload":{"tag":"li","lines":"242,244"}}],"payload":{"tag":"h3","lines":"240,241"}}],"payload":{"tag":"h2","lines":"234,235"}},{"content":"&#x1f476; 2) P&#xe9;riodes cl&#xe9;s du d&#xe9;veloppement alimentaire","children":[{"content":"&#x1f37c; 2.1 Avant et juste apr&#xe8;s la naissance","children":[{"content":"<strong>P&#xe9;riode pr&#xe9;natale</strong> : exposition aux saveurs par l&#x2019;alimentation maternelle (dans le liquide amniotique) modifie les pr&#xe9;f&#xe9;rences ult&#xe9;rieures (effets adaptatifs observ&#xe9;s)","children":[],"payload":{"tag":"li","lines":"249,250"}},{"content":"<strong>P&#xe9;riode n&#xe9;onatale</strong> : les r&#xe9;actions gustatives de base (pr&#xe9;f&#xe9;rence pour le sucr&#xe9;, rejet de l&#x2019;amer) sont visibles tr&#xe8;s t&#xf4;t, mais elles ne d&#xe9;finissent pas un comportement alimentaire fixe","children":[],"payload":{"tag":"li","lines":"250,252"}}],"payload":{"tag":"h3","lines":"248,249"}},{"content":"&#x1f372; 2.2 De l&#x2019;allaitement au sevrage","children":[{"content":"Transition du lait maternel / lait infantile vers les <strong>aliments solides</strong> : apprentissages moteurs (mastications, coordination bouche/ingestion), sensoriels (texture, odeur, go&#xfb;t) et relationnels (<em>dyade m&#xe8;re-enfant</em>)","children":[],"payload":{"tag":"li","lines":"253,254"}},{"content":"Cette &#xe9;tape pr&#xe9;sente une <strong>phase d&#x2019;adaptation cruciale</strong> pour la construction des pr&#xe9;f&#xe9;rences alimentaires","children":[],"payload":{"tag":"li","lines":"254,256"}}],"payload":{"tag":"h3","lines":"252,253"}},{"content":"&#x1f467; 2.3 Petite enfance &#xe0; &#xe2;ge scolaire","children":[{"content":"D&#xe9;veloppement des pr&#xe9;f&#xe9;rences et des <strong>habitudes alimentaires</strong> : apprentissage par observation des pairs et des adultes, normes sociales des repas, contexte familial","children":[],"payload":{"tag":"li","lines":"257,258"}},{"content":"La capacit&#xe9; &#xe0; r&#xe9;guler l&#x2019;app&#xe9;tit s&#x2019;affine mais reste influenc&#xe9;e par l&#x2019;environnement social et les pratiques culturelles","children":[],"payload":{"tag":"li","lines":"258,260"}}],"payload":{"tag":"h3","lines":"256,257"}}],"payload":{"tag":"h2","lines":"246,247"}},{"content":"&#x1f9ec; 3) Facteurs d&#xe9;terminants de l&#x2019;ontogen&#xe8;se","children":[{"content":"&#x1f9e0; 3.1 Biologiques et neuro-sensoriels","children":[{"content":"<strong>Syst&#xe8;mes gustatif et olfactif</strong> : maturation progressive durant l&#x2019;enfance","children":[],"payload":{"tag":"li","lines":"265,266"}},{"content":"<strong>R&#xe9;gulation physiologique de la faim et de la sati&#xe9;t&#xe9;</strong> : int&#xe9;gration de signaux internes et externes","children":[],"payload":{"tag":"li","lines":"266,268"}}],"payload":{"tag":"h3","lines":"264,265"}},{"content":"&#x1f468;&#x200d;&#x1f469;&#x200d;&#x1f467;&#x200d;&#x1f466; 3.2 Sociaux et environnementaux","children":[{"content":"<strong>Mod&#xe9;lisation familiale</strong> : enfants imitent choix et comportements alimentaires de leurs proches","children":[],"payload":{"tag":"li","lines":"269,270"}},{"content":"<strong>Normes culturelles des repas</strong> : horaires, types d&#x2019;aliments, r&#xe8;gles de comportement &#xe0; table","children":[],"payload":{"tag":"li","lines":"270,271"}},{"content":"<strong>Disponibilit&#xe9; alimentaire</strong> et environnement social influencent fortement l&#x2019;apprentissage alimentaire","children":[],"payload":{"tag":"li","lines":"271,273"}}],"payload":{"tag":"h3","lines":"268,269"}},{"content":"&#x1f9e0; 3.3 Cognitifs et &#xe9;motionnels","children":[{"content":"<strong>Apprentissage par exp&#xe9;rience</strong> : r&#xe9;p&#xe9;titions, exposition &#xe0; une diversit&#xe9; d&#x2019;aliment","children":[],"payload":{"tag":"li","lines":"274,275"}},{"content":"<strong>&#xc9;motions et plaisirs alimentaires</strong> : les exp&#xe9;riences positives ou n&#xe9;gatives fa&#xe7;onnent pr&#xe9;f&#xe9;rences","children":[],"payload":{"tag":"li","lines":"275,277"}}],"payload":{"tag":"h3","lines":"273,274"}}],"payload":{"tag":"h2","lines":"262,263"}},{"content":"&#x1f504; 4) Approche biopsychosociale int&#xe9;gr&#xe9;e","children":[{"content":"&#x1f9e0; 4.1 D&#xe9;veloppement complet","children":[{"content":"L&#x2019;alimentation n&#x2019;est <strong>pas statique</strong> : elle r&#xe9;sulte de l&#x2019;int&#xe9;gration de <em>capacit&#xe9;s physiologiques</em>, <em>comp&#xe9;tences cognitives</em>, et <em>apprentissages sociaux et culturels</em>","children":[],"payload":{"tag":"li","lines":"282,283"}},{"content":"La compr&#xe9;hension requiert de d&#xe9;passer une vision strictement biologique pour inclure la <strong>dimension socio-culturelle et culturelle de l&#x2019;alimentation</strong>","children":[],"payload":{"tag":"li","lines":"283,285"}}],"payload":{"tag":"h3","lines":"281,282"}},{"content":"&#x1f4cd; 4.2 Implications pour les soins","children":[{"content":"En soins infirmiers p&#xe9;diatriques, reconna&#xee;tre que les comportements alimentaires sont <strong>le produit d&#x2019;un d&#xe9;veloppement int&#xe9;gratif et culturel</strong> aide &#xe0; formuler des strat&#xe9;gies d&#x2019;accompagnement adapt&#xe9;es","children":[],"payload":{"tag":"li","lines":"286,287"}},{"content":"Ex : choix alimentaires, repas en institution, soutien nutritionnel respectueux des pratiques culturelles","child
