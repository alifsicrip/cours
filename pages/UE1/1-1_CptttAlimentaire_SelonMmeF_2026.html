on","children":[{"content":"Sociologue et anthropologue associ&#xe9; &#xe0; la logique du don : donner, recevoir, rendre.","children":[],"payload":{"tag":"li","lines":"21,22"}}],"payload":{"tag":"h3","lines":"20,21"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Inviter quelqu&#x2019;un &#xe0; manger cr&#xe9;e un lien social.","children":[],"payload":{"tag":"li","lines":"23,24"}},{"content":"Refuser peut parfois &#xea;tre v&#xe9;cu comme un rejet.","children":[],"payload":{"tag":"li","lines":"24,26"}}],"payload":{"tag":"h3","lines":"22,23"}},{"content":"&#x1fa7a; Lien avec le soin IDE","children":[{"content":"Le repas &#xe0; l&#x2019;h&#xf4;pital n&#x2019;est pas seulement nutritionnel : il peut aussi &#xea;tre un moment relationnel, social et affectif.","children":[],"payload":{"tag":"li","lines":"27,29"}}],"payload":{"tag":"h3","lines":"26,27"}}],"payload":{"tag":"h2","lines":"19,20"}}],"payload":{"tag":"h1","lines":"9,10"}},{"content":"&#x1f3af; SCH&#xc9;MA FINAL &#xc0; M&#xc9;MORISER","children":[{"content":"&#x1f37d;&#xfe0f; ALIMENTATION = BIOLOGIQUE + CULTUREL","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Se nourrir r&#xe9;pond &#xe0; un besoin vital, mais la mani&#xe8;re de manger d&#xe9;pend de la culture, de l&#x2019;&#xe9;ducation, de la religion, de l&#x2019;&#xe9;conomie et de l&#x2019;histoire personnelle.</strong>","children":[],"payload":{"tag":"li","lines":"33,35"}}],"payload":{"tag":"h3","lines":"32,33"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Tout le monde doit manger, mais tout le monde ne mange pas les m&#xea;mes aliments ni de la m&#xea;me fa&#xe7;on.","children":[],"payload":{"tag":"li","lines":"36,37"}}],"payload":{"tag":"h3","lines":"35,36"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Comprendre les habitudes alimentaires permet d&#x2019;adapter les soins, les r&#xe9;gimes et l&#x2019;&#xe9;ducation th&#xe9;rapeutique.","children":[],"payload":{"tag":"li","lines":"38,40"}}],"payload":{"tag":"h3","lines":"37,38"}}],"payload":{"tag":"h2","lines":"31,32"}},{"content":"&#x1f34e; ALIMENT COMESTIBLE","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Aliment biologiquement mangeable, sans danger particulier pour l&#x2019;&#xea;tre humain.</strong>","children":[],"payload":{"tag":"li","lines":"43,45"}}],"payload":{"tag":"h3","lines":"42,43"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Insectes.","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"Cheval.","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"Grenouilles.","children":[],"payload":{"tag":"li","lines":"48,49"}}],"payload":{"tag":"h3","lines":"45,46"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Un aliment peut &#xea;tre nutritionnellement possible mais refus&#xe9; par le patient pour des raisons culturelles ou personnelles.","children":[],"payload":{"tag":"li","lines":"50,51"}}],"payload":{"tag":"h3","lines":"49,50"}}],"payload":{"tag":"h2","lines":"41,42"}},{"content":"&#x1f37d;&#xfe0f; ALIMENT CONSOMMABLE","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Aliment culturellement accept&#xe9; par une personne ou un groupe.</strong>","children":[],"payload":{"tag":"li","lines":"54,55"}}],"payload":{"tag":"h3","lines":"53,54"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Les insectes sont consomm&#xe9;s dans certaines cultures mais souvent refus&#xe9;s en France.","children":[],"payload":{"tag":"li","lines":"56,57"}}],"payload":{"tag":"h3","lines":"55,56"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Ne pas forcer ni juger un refus alimentaire.","children":[],"payload":{"tag":"li","lines":"58,59"}},{"content":"Chercher &#xe0; comprendre le sens du refus.","children":[],"payload":{"tag":"li","lines":"59,60"}}],"payload":{"tag":"h3","lines":"57,58"}}],"payload":{"tag":"h2","lines":"52,53"}},{"content":"&#x1f9b4; INCORPORATION","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Manger, c&#x2019;est faire entrer un &#xe9;l&#xe9;ment ext&#xe9;rieur dans son corps.</strong>","children":[],"payload":{"tag":"li","lines":"63,64"}},{"content":"<strong>Ce geste est biologique, psychologique et culturel.</strong>","children":[],"payload":{"tag":"li","lines":"64,66"}}],"payload":{"tag":"h3","lines":"62,63"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Certaines personnes refusent un aliment car elles ont l&#x2019;impression qu&#x2019;il est &#xab; sale &#xbb;, &#xab; interdit &#xbb; ou contraire &#xe0; leurs valeurs.","children":[],"payload":{"tag":"li","lines":"67,69"}}],"payload":{"tag":"h3","lines":"66,67"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Le refus alimentaire peut exprimer une peur, une croyance, un d&#xe9;go&#xfb;t ou une repr&#xe9;sentation corporelle.","children":[],"payload":{"tag":"li","lines":"70,71"}}],"payload":{"tag":"h3","lines":"69,70"}}],"payload":{"tag":"h2","lines":"61,62"}},{"content":"&#x1f6ab; TABOUS ET INTERDITS ALIMENTAIRES","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Interdictions alimentaires li&#xe9;es &#xe0; une culture, une religion ou un syst&#xe8;me symbolique.</strong>","children":[],"payload":{"tag":"li","lines":"74,75"}}],"payload":{"tag":"h3","lines":"73,74"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Interdit du porc chez les personnes juives ou musulmanes pratiquantes.","children":[],"payload":{"tag":"li","lines":"76,77"}}],"payload":{"tag":"h3","lines":"75,76"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Adapter les repas aux croyances, aux je&#xfb;nes et aux interdits religieux quand cela est possible.","children":[],"payload":{"tag":"li","lines":"78,79"}}],"payload":{"tag":"h3","lines":"77,78"}}],"payload":{"tag":"h2","lines":"72,73"}},{"content":"&#x26aa;&#x26ab; PUR ET IMPUR","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Cat&#xe9;gories symboliques utilis&#xe9;es par les soci&#xe9;t&#xe9;s pour classer les aliments, les gestes ou les comportements.</strong>","children":[],"payload":{"tag":"li","lines":"82,83"}}],"payload":{"tag":"h3","lines":"81,82"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Dans certaines cultures, la main droite est associ&#xe9;e au pur et la main gauche &#xe0; l&#x2019;intime.","children":[],"payload":{"tag":"li","lines":"84,86"}}],"payload":{"tag":"h3","lines":"83,84"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Respecter les pratiques corporelles, alimentaires et religieuses du patient.","children":[],"payload":{"tag":"li","lines":"87,88"}}],"payload":{"tag":"h3","lines":"86,87"}}],"payload":{"tag":"h2","lines":"80,81"}},{"content":"&#x1f525; FEU ET CUISSON","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"Le feu transforme l&#x2019;alimentation humaine.","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"<strong>Il permet la cuisson, facilite la digestion et d&#xe9;veloppe la vie sociale.</strong>","children":[],"payload":{"tag":"li","lines":"92,94"}}],"payload":{"tag":"h3","lines":"90,91"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Les repas cuits favorisent les veill&#xe9;es, les &#xe9;changes et la vie collective.","children":[],"payload":{"tag":"li","lines":"95,96"}}],"payload":{"tag":"h3","lines":"94,95"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Tenir compte des pr&#xe9;f&#xe9;rences de texture, temp&#xe9;rature, cuisson et pr&#xe9;sentation des aliments.","children":[],"payload":{"tag":"li","lines":"97,98"}}],"payload":{"tag":"h3","lines":"96,97"}}],"payload":{"tag":"h2","lines":"89,90"}},{"content":"&#x1f373; CUISINE","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Syst&#xe8;me culturel organis&#xe9; autour des aliments, des modes de cuisson, des go&#xfb;ts, des odeurs, des couleurs et de la pr&#xe9;sentation.</strong>","children":[],"payload":{"tag":"li","lines":"101,102"}}],"payload":{"tag":"h3","lines":"100,101"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"La cuisine m&#xe9;diterran&#xe9;enne.","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"La cuisine japonaise.","children":[],"payload":{"tag":"li","lines":"104,105"}},{"content":"La cuisine maghr&#xe9;bine.","children":[],"payload":{"tag":"li","lines":"105,106"}},{"content":"Chacune poss&#xe8;de ses propres codes.","children":[],"payload":{"tag":"li","lines":"106,107"}}],"payload":{"tag":"h3","lines":"102,103"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"L&#x2019;alimentation hospitali&#xe8;re peut &#xea;tre difficile &#xe0; accepter si elle s&#x2019;&#xe9;loigne fortement des habitudes du patient.","children":[],"payload":{"tag":"li","lines":"108,110"}}],"payload":{"tag":"h3","lines":"107,108"}}],"payload":{"tag":"h2","lines":"99,100"}},{"content":"&#x1f3e0; CUISINE COMME LIEU SOCIAL","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>La cuisine est un espace de vie, de transmission et de convivialit&#xe9;.</strong>","children":[],"payload":{"tag":"li","lines":"113,114"}}],"payload":{"tag":"h3","lines":"112,113"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"La cuisine familiale comme lieu de discussion, de pr&#xe9;paration et de partage.","children":[],"payload":{"tag":"li","lines":"115,116"}}],"payload":{"tag":"h3","lines":"114,115"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"En institution, le repas peut remplacer partiellement ce r&#xf4;le social s&#x2019;il est accompagn&#xe9; avec attention.","children":[],"payload":{"tag":"li","lines":"117,119"}}],"payload":{"tag":"h3","lines":"116,117"}}],"payload":{"tag":"h2","lines":"111,112"}},{"content":"&#x1f476; ALIMENTATION ET D&#xc9;VELOPPEMENT","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"Chez l&#x2019;enfant, l&#x2019;alimentation <strong>participe &#xe0; la s&#xe9;curit&#xe9; affective, au d&#xe9;veloppement psychique et &#xe0; la relation avec l&#x2019;adulte.</strong>","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"h3","lines":"121,122"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Le biberon ou le repas peut &#xea;tre un moment de lien, de regard et de r&#xe9;assurance.","children":[],"payload":{"tag":"li","lines":"125,126"}}],"payload":{"tag":"h3","lines":"124,125"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"En p&#xe9;diatrie, l&#x2019;alimentation est aussi un soin relationnel.","children":[],"payload":{"tag":"li","lines":"127,129"}}],"payload":{"tag":"h3","lines":"126,127"}}],"payload":{"tag":"h2","lines":"120,121"}},{"content":"&#x1f91d; ALIMENTATION ET LIEN SOCIAL**","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Partager un repas cr&#xe9;e du lien, de l&#x2019;appartenance et de la reconnaissance.</strong>","children":[],"payload":{"tag":"li","lines":"132,134"}}],"payload":{"tag":"h3","lines":"131,132"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Le mot &#xab; copain &#xbb; vient de <em>cum pane</em> : celui avec qui l&#x2019;on partage le pain.","children":[],"payload":{"tag":"li","lines":"135,137"}}],"payload":{"tag":"h3","lines":"134,135"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Le repas peut &#xea;tre un moment d&#x2019;observation clinique mais aussi de relation soignante.","children":[],"payload":{"tag":"li","lines":"138,140"}}],"payload":{"tag":"h3","lines":"137,138"}}],"payload":{"tag":"h2","lines":"130,131"}},{"content":"&#x1f381; DONNER &#x2013; RECEVOIR &#x2013; RENDRE","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"Selon Marcel Mauss, <strong>les relations sociales reposent sur l&#x2019;&#xe9;change.</strong>","children":[],"payload":{"tag":"li","lines":"144,146"}}],"payload":{"tag":"h3","lines":"143,144"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Inviter quelqu&#x2019;un &#xe0; manger cr&#xe9;e une obligation symbolique de recevoir ou de rendre.","children":[],"payload":{"tag":"li","lines":"147,149"}}],"payload":{"tag":"h3","lines":"146,147"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Recevoir un repas, une aide ou un soin peut placer le patient dans une position de d&#xe9;pendance.","children":[],"payload":{"tag":"li","lines":"150,151"}},{"content":"L&#x2019;IDE doit pr&#xe9;server son autonomie et sa dignit&#xe9;.","children":[],"payload":{"tag":"li","lines":"151,153"}}],"payload":{"tag":"h3","lines":"149,150"}}],"payload":{"tag":"h2","lines":"141,142"}},{"content":"&#x1f6ab; ALIMENTATION ET EXCLUSION","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>Le repas peut inclure ou exclure selon les personnes, les lieux et les r&#xe8;gles sociales.</strong>","children":[],"payload":{"tag":"li","lines":"156,157"}}],"payload":{"tag":"h3","lines":"155,156"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Ne pas inviter quelqu&#x2019;un &#xe0; table peut signifier qu&#x2019;il n&#x2019;appartient pas au groupe.","children":[],"payload":{"tag":"li","lines":"158,160"}}],"payload":{"tag":"h3","lines":"157,158"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"En EHPAD ou &#xe0; l&#x2019;h&#xf4;pital, l&#x2019;isolement pendant les repas peut aggraver la solitude ou la perte d&#x2019;app&#xe9;tit.","children":[],"payload":{"tag":"li","lines":"161,163"}}],"payload":{"tag":"h3","lines":"160,161"}}],"payload":{"tag":"h2","lines":"154,155"}},{"content":"&#x1f468;&#x200d;&#x1f469;&#x200d;&#x1f467; R&#xc8;GLES SOCIALES DU REPAS","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"Le repas transmet des <strong>normes : politesse, place de chacun, r&#xf4;les familiaux, respect, langage.</strong>","children":[],"payload":{"tag":"li","lines":"166,167"}}],"payload":{"tag":"h3","lines":"165,166"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Attendre que tout le monde soit servi avant de manger.","children":[],"payload":{"tag":"li","lines":"168,169"}}],"payload":{"tag":"h3","lines":"167,168"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"Comprendre ces r&#xe8;gles &#xe9;vite de juger certains comportements alimentaires ou familiaux.","children":[],"payload":{"tag":"li","lines":"170,171"}}],"payload":{"tag":"h3","lines":"169,170"}}],"payload":{"tag":"h2","lines":"164,165"}},{"content":"&#x1fa7a; APPLICATIONS INFIRMI&#xc8;RES","children":[{"content":"&#x1f4d6; D&#xe9;finition","children":[{"content":"<strong>L&#x2019;IDE prend en compte l&#x2019;alimentation dans ses dimensions biologique, m&#xe9;dicale, culturelle, psychologique et relationnelle.</strong>","children":[],"payload":{"tag":"li","lines":"174,176"}}],"payload":{"tag":"h3","lines":"173,174"}},{"content":"&#x1f4a1; Exemple","children":[{"content":"Adapter un repas &#xe0; un patient diab&#xe9;tique qui respecte aussi un interdit religieux.","children":[],"payload":{"tag":"li","lines":"177,178"}}],"payload":{"tag":"h3","lines":"176,177"}},{"content":"&#x1fa7a; Lien IDE","children":[{"content":"L&#x2019;IDE doit concilier :","children":[],"payload":{"tag":"li","lines":"179,180"}},{"content":"contraintes m&#xe9;dicales ;","children":[],"payload":{"tag":"li","lines":"180,181"}},{"content":"go&#xfb;ts du patient ;","children":[],"payload":{"tag":"li","lines":"181,182"}},{"content":"croyances ;","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"s&#xe9;curit&#xe9; nutritionnelle ;","children":[],"payload":{"tag":"li","lines":"183,184"}},{"content":"dignit&#xe9; ;","children":[],"payload":{"tag":"li","lines":"184,185"}},{"content":"autonomie.","children":[],"payload":{"tag":"li","lines":"185,187"}}],"payload":{"tag":"h3","lines":"178,179"}}],"payload":{"tag":"h2","lines":"172,173"}}],"payload":{"tag":"h1","lines":"30,31"}},{"content":"&#x2b50; LES 4 CONCEPTS MAJEURS &#xc0; SAVOIR ABSOLUMENT","children":[{"content":"\n<h2 data-lines=\"189,190\">1&#xfe0f;&#x20e3; Comestible &#x2260; consommable</h2>\n<p data-lines=\"190,191\">&#x27a1;&#xfe0f; Tout ce qui peut &#xea;tre mang&#xe9; biologiquement n&#x2019;est pas accept&#xe9; culturellement.</p>","children":[],"payload":{"tag":"li","lines":"189,192"}},{"content":"\n<h2 data-lines=\"192,193\">2&#xfe0f;&#x20e3; Incorporation</h2>\n<p data-lines=\"193,194\">&#x27a1;&#xfe0f; Manger, c&#x2019;est int&#xe9;grer un aliment, mais aussi des symboles, des &#xe9;motions et des valeurs.</p>","children":[],"payload":{"tag":"li","lines":"192,195"}},{"content":"\n<h2 data-lines=\"195,196\">3&#xfe0f;&#x20e3; Pur / impur et interdits alimentaires</h2>\n<p data-lines=\"196,197\">&#x27a1;&#xfe0f; Les cultures organisent l&#x2019;alimentation selon des r&#xe8;gles symboliques.</p>","children":[],"payload":{"tag":"li","lines":"195,198"}},{"content":"\n<h2 data-lines=\"198,199\">4&#xfe0f;&#x20e3; Alimentation et lien social</h2>\n<p data-lines=\"199,200\">&#x27a1;&#xfe0f; Manger cr&#xe9;e de l&#x2019;appartenance, de la relation, mais peut aussi produire de l&#x2019;exclusion.</p>","children":[],"payload":{"tag":"li","lines":"198,201"}}],"payload":{"tag":"h1","lines":"188,189"}},{"content":"&#x1f4a1; ASTUCE PARTIEL IFSI","children":[{"content":"\n<p data-lines=\"203,204\">Face &#xe0; une situation clinique li&#xe9;e &#xe0; l&#x2019;alimentation, se poser :</p>","children":[{"content":"1&#xfe0f;&#x20e3; Le probl&#xe8;me est-il biologique, culturel, religieux, psychologique ou social ?","children":[],"payload":{"tag":"li","lines":"205,206"}},{"content":"2&#xfe0f;&#x20e3; L&#x2019;aliment est-il comestible mais non consommable pour le patient ?","children":[],"payload":{"tag":"li","lines":"206,207"}},{"content":"3&#xfe0f;&#x20e3; Existe-t-il un interdit, un tabou ou une croyance ?","children":[],"payload":{"tag":"li","lines":"207,208"}},{"content":"4&#xfe0f;&#x20e3; Le repas est-il un moment de lien social ou d&#x2019;isolement ?","children":[],"payload":{"tag":"li","lines":"208,209"}},{"content":"5&#xfe0f;&#x20e3; Comment adapter le soin sans juger les pratiques du patient ?","children":[],"payload":{"tag":"li","lines":"209,210"}}],"payload":{"tag":"li","lines":"203,210"}}],"payload":{"tag":"h1","lines":"202,203"}},{"content":"&#x1f9e0; PHRASE CL&#xc9; POUR L&#x2019;ORAL","children":[{"content":"&#xab; L&#x2019;anthropologie alimentaire montre que manger n&#x2019;est jamais seulement un acte biologique : c&#x2019;est aussi un acte culturel, social, religieux, psychologique et relationnel. En soins infirmiers, cela oblige &#xe0; adapter l&#x2019;accompagnement alimentaire aux habitudes, aux croyances, aux contraintes m&#xe9;dicales et &#xe0; la dignit&#xe9; du patient. &#xbb;","children":[],"payload":{"tag":"li","lines":"213,215"}}],"payload":{"tag":"h1","lines":"211,212"}}]},{"colorFreezeLevel":2,"maxWidth":600,"initialExpandLevel":2})</script>
