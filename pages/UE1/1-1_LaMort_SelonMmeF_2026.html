225,226"}},{"content":"\n<h2 data-lines=\"227,228\">4&#xfe0f;&#x20e3; Relativit&#xe9; culturelle de la mort</h2>","children":[],"payload":{"tag":"li","lines":"227,228"}}],"payload":{"tag":"h1","lines":"220,221"}},{"content":"&#x1f4a1; ASTUCE PARTIEL IFSI","children":[{"content":"Face &#xe0; une situation de fin de vie ou de d&#xe9;c&#xe8;s, se poser syst&#xe9;matiquement :","children":[{"content":"1&#xfe0f;&#x20e3; Quelle est la repr&#xe9;sentation de la mort du patient ou de la famille ?","children":[],"payload":{"tag":"li","lines":"232,233"}},{"content":"2&#xfe0f;&#x20e3; Existe-t-il des croyances ou rites particuliers ?","children":[],"payload":{"tag":"li","lines":"233,234"}},{"content":"3&#xfe0f;&#x20e3; O&#xf9; en est la personne dans son processus de deuil ?","children":[],"payload":{"tag":"li","lines":"234,235"}},{"content":"4&#xfe0f;&#x20e3; Comment respecter ses valeurs sans imposer les miennes ?","children":[],"payload":{"tag":"li","lines":"235,236"}},{"content":"5&#xfe0f;&#x20e3; Quels besoins physiques, psychologiques, sociaux et spirituels n&#xe9;cessitent une r&#xe9;ponse soignante ?","children":[],"payload":{"tag":"li","lines":"236,237"}}],"payload":{"tag":"li","lines":"231,237"}},{"content":"&#x1f9e0; Phrase de synth&#xe8;se &#xe0; retenir pour l&apos;oral :","children":[{"content":"&#xab; La mort est un fait biologique universel, mais les fa&#xe7;ons de la comprendre, de l&apos;accompagner et de lui donner du sens sont des constructions sociales, culturelles et spirituelles. Le r&#xf4;le infirmier consiste &#xe0; accompagner la personne et ses proches avec respect, humanit&#xe9; et neutralit&#xe9; culturelle. &#xbb;","children":[],"payload":{"tag":"li","lines":"238,239"}}],"payload":{"tag":"li","lines":"237,239"}}],"payload":{"tag":"h1","lines":"230,231"}}]},{"colorFreezeLevel":2,"maxWidth":600,"initialExpandLevel":2})</script>
