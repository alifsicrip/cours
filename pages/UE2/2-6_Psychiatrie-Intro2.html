d":{"tag":"li","lines":"11,13"}},{"content":"\n<p data-lines=\"13,14\">Diff&#xe9;rence entre psychiatrie et neurologie ? La psychiatrie c&apos;est de la neurologie qui n&apos;est pas encore identifier par des marqueurs biologiques (ex. Alzheimer a des marqueurs bio et des images d&apos;atrophie, ce qui n&apos;est pas encore le cas pour la schizophr&#xe9;nie par exemple)</p>","children":[],"payload":{"tag":"li","lines":"13,14"}},{"content":"\n<p data-lines=\"14,15\">&#xca;tre le bon objet ou &#xea;tre le mauvais objet : attention &#xe0; ne pas manipuler, toujours travailler sur le &quot;nous&quot; et &#xea;tre tr&#xe8;s vigilante si mauvais objet + bien communiquer avec l&apos;&#xe9;quipe</p>","children":[],"payload":{"tag":"li","lines":"14,15"}},{"content":"\n<p data-lines=\"15,16\">Il n&apos;y a pas de jugement de valeur, &#xea;tre le mauvais objet n&apos;est pas synonyme de mauvais soignant, rien avoir avec soi, c&apos;est l&apos;autre qui &quot;projette&quot;</p>","children":[],"payload":{"tag":"li","lines":"15,16"}},{"content":"\n<p data-lines=\"16,17\">Demander &#xe0; aller voir la sismoth&#xe9;rapie au CHU de Montpellier (sous s&#xe9;dation cura et AG) = tellement efficace que c&apos;est presque miraculeux (d&#xe9;pression et manie) et rTMS (hallucination, d&#xe9;pression, addiction) mais dans des cas de troubles sp&#xe9;cifiques. Trouver des publications &#xe0; ces sujets.</p>","children":[],"payload":{"tag":"li","lines":"16,17"}},{"content":"\n<p data-lines=\"17,18\">Comprendre les Thymor&#xe9;gulateur vs neuroleptique vs antid&#xe9;presseur</p>","children":[],"payload":{"tag":"li","lines":"17,18"}},{"content":"\n<p data-lines=\"18,19\">Besoin de remplissage dans une situation de morcellement corporelle</p>","children":[],"payload":{"tag":"li","lines":"18,19"}},{"content":"\n<p data-lines=\"19,20\">La diff&#xe9;rence entre des go&#xfb;ts particuliers et une paraphr&#xe9;nie, c&apos;est l&apos;adh&#xe9;sion (c&#xe0;d la capacit&#xe9; &#xe0; se d&#xe9;tacher, &#xe0; prendre de la distance, avec l&apos;id&#xe9;e d&#xe9;lirante)</p>","children":[],"payload":{"tag":"li","lines":"19,21"}}],"payload":{"tag":"h1","lines":"7,8"}},{"content":"1&#xfe0f;&#x20e3; &#x1f570;&#xfe0f; &#xc9;VOLUTION HISTORIQUE","children":[{"content":"&#x1f3db;&#xfe0f; Repr&#xe9;sentations de la &quot;folie&quot;","children":[{"content":"\n<p data-lines=\"26,27\">[ la &quot;folie&quot; existe avant la psychiatrie ]</p>","children":[{"content":"Chez les grecques, la Pitie","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"Abraham sacrifiant Isaac","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"Le Dieu Janus, rieur et pleureur","children":[],"payload":{"tag":"li","lines":"29,30"}},{"content":"Comment &#xe9;tait trait&#xe9;e la maladie mentale avant la m&#xe9;decine ? Per&#xe7;u et traiter comme des oracles, des sorci&#xe8;res, des dieux (plut&#xf4;t positif), seront bien ins&#xe9;r&#xe9;es","children":[],"payload":{"tag":"li","lines":"30,32"}}],"payload":{"tag":"li","lines":"26,32"}},{"content":"\n<p data-lines=\"32,33\">Antiquit&#xe9; / Moyen &#xc2;ge &#x2192; &#x1f9ff; Explications religieuses (possession, d&#xe9;monologie) = l&#xe9;prosie-&gt;isol&#xe9;e</p>","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"\n<p data-lines=\"33,34\">XVIIe si&#xe8;cle &#x2192; &#x2699;&#xfe0f; Vision m&#xe9;caniste c&#xe9;r&#xe9;brale</p>","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"\n<p data-lines=\"34,35\">XIXe-XXe si&#xe8;cle &#x2192; &#x2696;&#xfe0f; Oscillation :</p>","children":[{"content":"&#x1f9ec; Organogen&#xe8;se (origine biologique : va donner la neurologie)","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"&#x1f9e0; Psychogen&#xe8;se (origine psychique : va donner la psychanalyse, ttt de l&apos;origine du trouble, Freud)","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"cognitivo-comportementaliste (va donner les TCC, ttt des sympt&#xf4;mes du trouble, Pavlov)","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"&#x1f30d; Sociogen&#xe8;se (influence sociale : ensemble des facteurs psychosociaux qui contribuent au d&#xe9;terminisme multifactoriel des troubles psychiques)","children":[],"payload":{"tag":"li","lines":"38,40"}}],"payload":{"tag":"li","lines":"34,40"}}],"payload":{"tag":"h2","lines":"25,26"}},{"content":"&#x1f3e5; Naissance de la psychiatrie moderne","children":[{"content":"R&#xe9;volution fran&#xe7;aise &#x2192; <strong>Pinel : &#x1f5dd;&#xfe0f; concept de soin &#xe0; l&#x2019;ali&#xe9;n&#xe9;</strong>","children":[{"content":"&#x2192; humanisation des soins, &#xe0; l&apos;h&#xf4;pital bic&#xea;tre et salp&#xe9;tri&#xe8;re de paris. Rencontre une &#xe9;quipe de soignant, dont Jean-Baptiste Pucin qui traite diff&#xe9;remment, humainement. Pinel va g&#xe9;n&#xe9;raliser ce soin appeler <strong>traitement moral</strong>, mettant au coeur l&apos;humain et non la symptomatologie, et enlever les cha&#xee;nes (jusqu&apos;&#xe0; inviter les patients &#xe0; sa table &#xe0; manger en famille).","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"Il va cr&#xe9;er le concept d&apos;<strong>asile</strong> : la soci&#xe9;t&#xe9; a des vices, dysfonctionne donc on va cr&#xe9;er des espaces de paix pour les prot&#xe9;ger, leur permettre d&apos;exprimer leur potentiel (&#xe0; cette &#xe9;poque il y a d&apos;immense violence contre les personnes avec troubles mentale - pogrom)","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"1838 : 1&#xe8;re loi &quot;loi des alien&#xe9;s&quot;, avec sectorisation pour favoriser le maintien du lien social et familial","children":[],"payload":{"tag":"li","lines":"44,45"}}],"payload":{"tag":"li","lines":"41,45"}},{"content":"XXe si&#xe8;cle :","children":[{"content":"&#x1f48a; 1952 : D&#xe9;couverte des psychotropes -&gt; 1er neuroleptique Chlorpromazine","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"&#x26a1; 1938 : d&#
