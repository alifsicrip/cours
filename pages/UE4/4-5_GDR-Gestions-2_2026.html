rsonne :</p>","children":[],"payload":{"tag":"li","lines":"62,64"}},{"content":"\n<p data-lines=\"64,65\">&#x1f9ec; <strong>Biologiques</strong> (g&#xe9;n&#xe9;tiques)</p>","children":[],"payload":{"tag":"li","lines":"64,65"}},{"content":"\n<p data-lines=\"65,66\">&#x1f30d; <strong>Environnementaux</strong> (travail, milieu, organisation)</p>","children":[],"payload":{"tag":"li","lines":"65,66"}},{"content":"\n<p data-lines=\"66,67\">&#x1f9cd; <strong>Comportementaux</strong> (habitudes, addictions, pratiques)</p>","children":[],"payload":{"tag":"li","lines":"66,67"}},{"content":"\n<p data-lines=\"67,69\">&#x2022; Endog&#xe8;ne = mauvaise installation &#xe9;lectrique -&gt; incendie)<br>\n&#x2022; Exog&#xe8;ne = catastrophe naturelle</p>","children":[],"payload":{"tag":"li","lines":"67,70"}}],"payload":{"tag":"h3","lines":"61,62"}},{"content":"&#x1f6a8; 1.6 Prise de risque &amp; comportements &#xe0; risque","children":[{"content":"\n<p data-lines=\"73,74\"><strong>Volontaire</strong> : on sait &#xe0; quoi on s&#x2019;expose</p>","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"\n<p data-lines=\"74,75\"><strong>Involontaire</strong> : risque m&#xe9;connu ou impr&#xe9;vu</p>","children":[],"payload":{"tag":"li","lines":"74,76"}},{"content":"\n<p data-lines=\"76,77\">Comportements &#xe0; risques, aussi appel&#xe9; comportement-probl&#xe8;me. Exemples :</p>","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"\n<p data-lines=\"77,78\">&#x1f6ac; Psychotropes (alcool, tabac, drogues)</p>","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"\n<p data-lines=\"78,79\">&#x1f6cf;&#xfe0f; Rapports sexuels non prot&#xe9;g&#xe9;s</p>","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"\n<p data-lines=\"79,80\">&#x1f697; Comportement routier</p>","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"\n<p data-lines=\"80,81\">&#x1f3ae; Cyberaddiction</p>","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"\n<p data-lines=\"81,82\">&#x1f957; TCA / ob&#xe9;sit&#xe9; / anorexie</p>","children":[],"payload":{"tag":"li","lines":"81,82"}},{"content":"\n<p data-lines=\"82,83\">&#x1f3c3; Sports &#xe0; risque</p>","children":[],"payload":{"tag":"li","lines":"82,84"}}],"payload":{"tag":"h3","lines":"72,73"}}],"payload":{"tag":"h2","lines":"12,13"}},{"content":"&#x26a0;&#xfe0f; <strong>2 &#x2014; LE DANGER &#x2622;&#xfe0f;</strong>","children":[{"content":"&#x1f4cc; 2.1 D&#xe9;finition","children":[{"content":"&#x1f449; <strong>Le danger = capacit&#xe9; intrins&#xe8;que de nuire</strong>  = menace per&#xe7;ue, ressentie","children":[],"payload":{"tag":"li","lines":"88,89"}},{"content":"&#x1f449; <strong>Le risque = probabilit&#xe9; que le danger fasse des d&#xe9;g&#xe2;ts</strong>","children":[],"payload":{"tag":"li","lines":"89,91"}}],"payload":{"tag":"h3","lines":"87,88"}},{"content":"&#x1f9ea; Types de dangers","children":[{"content":"&#x1f9a0; <strong>Biologiques</strong> : virus, bact&#xe9;ries","children":[],"payload":{"tag":"li","lines":"92,93"}},{"content":"&#x2623;&#xfe0f; <strong>Chimiques</strong> : solvants, insecticides","children":[],"payload":{"tag":"li","lines":"93,94"}},{"content":"&#x1fa91; <strong>Ergonomiques</strong> : gestes r&#xe9;p&#xe9;titifs, mauvais poste de travail","children":[],"payload":{"tag":"li","lines":"94,95"}},{"content":"&#x1f321;&#xfe0f; <strong>Physiques</strong> : rayonnements, bruit, pression","children":[],"payload":{"tag":"li","lines":"95,96"}},{"content":"&#x1f614; <strong>Psychosociaux</strong> : harc&#xe8;lement, violence (qui est la personne dangereuse ?)","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"&#x2699;&#xfe0f; <strong>S&#xe9;curit&#xe9;</strong> : chutes, machines d&#xe9;fectueuses","children":[],"payload":{"tag":"li","lines":"97,99"}}],"payload":{"tag":"h3","lines":"91,92"}},{"content":"&#x1f9e0; Danger vs Risque (&#xe0; retenir car sera au partiel)","children":[{"content":"\n<p data-lines=\"100,101\">Un danger peut exister sans risque : <strong>La situation dangereuse est une r&#xe9;alit&#xe9; qui se voit, se constate, se d&#xe9;crit</strong></p>","children":[],"payload":{"tag":"li","lines":"100,101"}},{"content":"\n<p data-lines=\"101,102\">Le <strong>risque existe seulement si le danger peut atteindre une cible</strong></p>","children":[{"content":"Il existe souvent une confusion entre risque et danger","children":[{"content":"Il y a DANGER lorsqu&#x2019;un objet ou une situation poss&#xe8;de une capacit&#xe9; intrins&#xe8;que &#xe0; provoquer une effet dommageable","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"Le RISQUE repr&#xe9;sente la probabilit&#xe9; que ces effets dommageables se produisent (risque de chute/&#xe9;boulement)","children":[],"payload":{"tag":"li","lines":"104,105"}}],"payload":{"tag":"li","lines":"102,105"}}],"payload":{"tag":"li","lines":"101,105"}},{"content":"\n<p data-lines=\"105,106\">La pr&#xe9;vention : avant que le risque se mat&#xe9;rialise, pour l&apos;&#xe9;viter</p>","children":[],"payload":{"tag":"li","lines":"105,106"}},{"content":"\n<p data-lines=\"106,107\">La protection : pendant/apr&#xe8;s que le risque se soit mat&#xe9;rialis&#xe9;, pour limiter ses cons&#xe9;quences</p>","children":[],"payload":{"tag":"li","lines":"106,108"}},{"content":"\n<p data-lines=\"108,109\">&#x1f4a1; Exemple p&#xe9;dagogique 1 :</p>","children":[{"content":"<strong>Danger</strong> =  Vide de la falaise","children":[],"payload":{"tag":"li","lines":"109,110"}},{"content":"<strong>Risque</strong> = Chute ou &#xe9;crasement","children":[],"payload":{"tag":"li","lines":"110,111"}},{"content":"<strong>Cible</strong> = Etre humain","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"<strong>Pr&#xe9;vention</strong>= Panneaux d&apos;information, Barri&#xe8;res","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"<strong>Protection</strong> = Filets (&#xe9;boulements)","children":[],"payload":{"tag":"li","lines":"113,115"}}],"payload":{"tag":"li","lines":"108,115"}},{"content":"\n<p data-lines=\"115,116\">&#x1f4a1; Exemple p&#xe9;dagogique 2:</p>","children":[{"content":"<strong>DANGER</strong> = Une seringue souill&#xe9;e par du sang = DANGER","children":[],"payload":{"tag":"li","lines":"116,117"}},{"content":"<strong>RISQUE</strong> = AED","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>CIBLE</strong> = SOIGNANT.E","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"<strong>PREVENTION</strong>= formation continue, rappel des coll&#xe8;gues","children":[],"payload":{"tag":"li","lines":"119,120"}},{"content":"<strong>PROTECTION</strong>= protocole en cas d&apos;AES","children":[],"payload":{"tag":"li","lines":"120,122"}}],"payload":{"tag":"li","lines":"115,122"}},{"content":"\n<p data-lines=\"122,123\">Bien maitriser le raisonnement DANGER - RISQUE = un risque peu devenir un danger, et inversement (exemple de l&apos;infection urinaire) = les actions sont diff&#xe9;rentes (pr&#xe9;vention - protection)</p>","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"h3","lines":"99,100"}}],"payload":{"tag":"h2","lines":"85,86"}},{"content":"<strong>&#x1f3e5; 3 &#x2014; LES RISQUES EN &#xc9;TABLISSEMENT DE SANT&#xc9;</strong>","children":[{"content":"&#x1f9e9; 3.1 L&#x2019;h&#xf4;pital = organisation complexe","children":[{"content":"&#x1f449; Multiplicit&#xe9; d&#x2019;acteurs, d&#x2019;actes et de flux = <strong>forte exposition aux risques</strong>","children":[],"payload":{"tag":"li","lines":"128,130"}}],"payload":{"tag":"h3","lines":"127,128"}},{"content":"&#x2695;&#xfe0f; Principaux risques hospitaliers","children":[{"content":"&#x1f9a0; <strong>Risque infectieux (nosocomial)</strong>","children":[],"payload":{"tag":"li","lines":"131,132"}},{"content":"&#x1f48a; <strong>Risque iatrog&#xe8;ne (li&#xe9; aux soins)</strong>","children":[],"payload":{"tag":"li","lines":"132,133"}},{"content":"&#
