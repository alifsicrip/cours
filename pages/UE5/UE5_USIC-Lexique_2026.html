}],"payload":{"tag":"li","lines":"17,20"}},{"content":"\n<p data-lines=\"20,21\"><strong>Soins intensifs</strong> : Niveau de surveillance et de traitement renforc&#xe9;, sans ventilation invasive syst&#xe9;matique (diff&#xe9;rent de la r&#xe9;animation).</p>","children":[{"content":"&#x1f9e0; Surveillance continue + th&#xe9;rapeutiques IV","children":[],"payload":{"tag":"li","lines":"21,23"}}],"payload":{"tag":"li","lines":"20,23"}},{"content":"\n<p data-lines=\"23,24\"><strong>Surveillance continue</strong> : Monitorage en temps r&#xe9;el (ECG, TA, SpO&#x2082;).</p>","children":[],"payload":{"tag":"li","lines":"23,24"}},{"content":"\n<p data-lines=\"24,25\">&#x1f4c8; Permet de d&#xe9;tecter rapidement une arythmie ou un choc</p>","children":[],"payload":{"tag":"li","lines":"24,26"}},{"content":"\n<p data-lines=\"26,27\"><strong>Soins critiques</strong> : Prise en charge d&#x2019;une d&#xe9;faillance aigu&#xeb; d&#x2019;organe mena&#xe7;ant le pronostic vital</p>","children":[],"payload":{"tag":"li","lines":"26,28"}}],"payload":{"tag":"h2","lines":"15,16"}},{"content":"&#x1fac0; 2. Pathologies fr&#xe9;quentes en USIC","children":[{"content":"&#x1f534; Urgences coronariennes","children":[{"content":"\n<p data-lines=\"34,35\"><strong>SCA (Syndrome Coronarien Aigu)</strong> : Ensemble des situations li&#xe9;es &#xe0; une <strong>rupture de plaque d&#x2019;ath&#xe9;rome avec thrombose coronaire</strong></p>","children":[{"content":"\n<p data-lines=\"36,37\"><strong>STEMI (SCA ST+)</strong> : Infarctus avec sus-d&#xe9;calage ST persistant &#xe0; l&#x2019;ECG traduisant une occlusion coronaire compl&#xe8;te</p>","children":[{"content":"\n<p data-lines=\"37,38\">Autrement dit : &#x1f449; C&#x2019;est une occlusion compl&#xe8;te et brutale d&#x2019;une art&#xe8;re coronaire, qui prive une partie du c&#x153;ur d&#x2019;oxyg&#xe8;ne.</p>","children":[],"payload":{"tag":"li","lines":"37,39"}},{"content":"\n<p data-lines=\"39,40\">Sur l&#x2019;ECG, on observe un sus-d&#xe9;calage du segment ST, signe d&#x2019;isch&#xe9;mie transmurale (atteinte de toute l&#x2019;&#xe9;paisseur du muscle cardiaque)</p>","children":[{"content":"&#x1f6a8; Indication d&#x2019;angioplastie urgente (&lt;120 min)","children":[],"payload":{"tag":"li","lines":"40,42"}}],"payload":{"tag":"li","lines":"39,42"}}],"payload":{"tag":"li","lines":"36,42"}},{"content":"\n<p data-lines=\"42,43\"><strong>NSTEMI (SCA ST&#x2212;)</strong> : Infarctus sans sus-d&#xe9;calage ST mais avec &#xe9;l&#xe9;vation des troponines</p>","children":[{"content":"&#x1f4ca; Risque interm&#xe9;diaire &#xe0; &#xe9;lev&#xe9;","children":[],"payload":{"tag":"li","lines":"43,45"}}],"payload":{"tag":"li","lines":"42,45"}},{"content":"\n<p data-lines=\"45,46\"><strong>Angor instable</strong> : Douleur thoracique sans &#xe9;l&#xe9;vation des troponines</p>","children":[],"payload":{"tag":"li","lines":"45,47"}}],"payload":{"tag":"li","lines":"34,47"}},{"content":"\n<p data-lines=\"47,48\"><strong>IDM (Infarctus du Myocarde)</strong> : N&#xe9;crose du muscle cardiaque secondaire &#xe0; une isch&#xe9;mie prolong&#xe9;e</p>","children":[{"content":"&#x1f9ea; Confirm&#xe9; par &#xe9;l&#xe9;vation troponines + clinique","children":[],"payload":{"tag":"li","lines":"48,50"}}],"payload":{"tag":"li","lines":"47,50"}},{"content":"\n<p data-lines=\"50,51\"><strong>Isch&#xe9;mie myocardique</strong> : Diminution d&#x2019;apport en oxyg&#xe8;ne au myocarde</p>","children":[{"content":"&#x1f4ac; Exemple : douleur constrictive &#xe0; l&#x2019;effort","children":[],"payload":{"tag":"li","lines":"51,53"}}],"payload":{"tag":"li","lines":"50,53"}}],"payload":{"tag":"h3","lines":"32,33"}},{"content":"&#x1f30a; D&#xe9;faillances cardiaques","children":[{"content":"\n<p data-lines=\"57,58\"><strong>Insuffisance cardiaque aigu&#xeb;</strong> : Incapacit&#xe9; brutale du c&#x153;ur &#xe0; assurer un d&#xe9;bit sanguin suffisant</p>","children":[{"content":"&#x1f62e;&#x200d;&#x1f4a8; Dyspn&#xe9;e, cr&#xe9;pitants pulmonaires","children":[],"payload":{"tag":"li","lines":"58,60"}}],"payload":{"tag":"li","lines":"57,60"}},{"content":"\n<p data-lines=\"60,61\"><strong>OAP (&#x152;d&#xe8;me Aigu du Poumon)</strong> : Accumulation brutale de liquide dans les alv&#xe9;oles pulmonaires secondaire &#xe0; une d&#xe9;faillance ventriculaire gauche</p>","children":[{"content":"&#x1f691; Urgence : VNI + diur&#xe9;tiques IV","children":[],"payload":{"tag":"li","lines":"61,63"}}],"payload":{"tag":"li","lines":"60,63"}},{"content":"\n<p data-lines=\"63,64\"><strong>Choc cardiog&#xe9;nique</strong> : D&#xe9;faillance circulatoire par dysfonction cardiaque s&#xe9;v&#xe8;re avec hypotension persistante</p>","children":[{"content":"&#x1f4c9; PAM &lt; 65 mmHg + signes d&#x2019;hypoperfusion","children":[],"payload":{"tag":"li","lines":"64,66"}}],"payload":{"tag":"li","lines":"63,66"}}],"payload":{"tag":"h3","lines":"55,56"}}],"payload":{"tag":"h2","lines":"30,31"}},{"content":"&#x1f9e0; 3. Rythmes cardiaques et ECG (axe central USIC)","children":[{"content":"&#x1f4c8; Outils","children":[{"content":"\n<p data-lines=\"72,73\"><strong>ECG</strong> : Enregistrement de l&#x2019;activit&#xe9; &#xe9;lectrique cardiaque</p>","children":[{"content":"&#x1f9fe; Permet diagnostic infarctus, trouble du rythme","children":[],"payload":{"tag":"li","lines":"73,75"}}],"payload":{"tag":"li","lines":"72,75"}},{"content":"\n<p data-lines=\"75,76\"><strong>Scope</strong> : Monitorage ECG continu avec alarmes param&#xe9;tr&#xe9;es</p>","children":[],"payload":{"tag":"li","lines":"75,77"}}],"payload":{"tag":"h3","lines":"70,71"}},{"content":"&#x2764;&#xfe0f; Rythmes","children":[{"content":"\n<p data-lines=\"81,82\"><strong>Rythme sinusal</strong> : Rythme normal initi&#xe9; par le n&#x153;ud sinusal (60&#x2013;100 bpm)</p>","children":[],"payload":{"tag":"li","lines":"81,83"}},{"content":"\n<p data-lines=\"83,84\"><strong>FA (Fibrillation Auriculaire)</strong> : Activit&#xe9; atriale anarchique avec rythme ventriculaire irr&# "lines":"105,107"}},{"content":"\n<p data-lines=\"107,108\"><strong>Sus / sous-d&#xe9;calage ST</strong> : Anomalie segment ST traduisant isch&#xe9;mie ou infarctus</p>","children":[],"payload":{"tag":"li","lines":"107,109"}}],"payload":{"tag":"h3","lines":"100,101"}}],"payload":{"tag":"h2","lines":"68,69"}},{"content":"&#x1f4ca; 4. Surveillance IDE en USIC","children":[{"content":"&#x1f50d; Param&#xe8;tres surveill&#xe9;s","children":[{"content":"<strong>FC</strong> : Battements/minute","children":[],"payload":{"tag":"li","lines":"115,116"}},{"content":"<strong>TA / PAM</strong> : PAM = (PAS + 2 PAD)/3. Objectif &#x2265; 65 mmHg","children":[],"payload":{"tag":"li","lines":"116,117"}},{"content":"<strong>SpO&#x2082;</strong> : Saturation en oxyg&#xe8;ne p&#xe9;riph&#xe9;rique","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>Diur&#xe8;se horaire</strong> : Indicateur perfusion r&#xe9;nale (&gt;0,5 ml/kg/h)","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"<strong>&#xc9;tat neurologique</strong> : Score de Glasgow simplifi&#xe9;","children":[],"payload":{"tag":"li","lines":"119,120"}},{"content":"<strong>Douleur (EVA/EN)</strong> : &#xc9;valuation standardis&#xe9;e","children":[],"payload":{"tag":"li","lines":"120,122"}}],"payload":{"tag":"h3","lines":"113,114"}},{"content":"&#x1f9ea; Surveillance sp&#xe9;cifique","children":[{"content":"<strong>Surveillance h&#xe9;modynamique</strong> : &#xc9;valuation du d&#xe9;bit cardiaque et de la perfusion","children":[],"payload":{"tag":"li","lines":"126,127"}},{"content":"<strong>Bilan entr&#xe9;es/sorties</strong> : Pr&#xe9;vention surcharge ou d&#xe9;shydratation","children":[],"payload":{"tag":"li","lines":"127,128"}},{"content":"<strong>Alarmes scope</strong> : Param&#xe9;trage personnalis&#xe9;","children":[],"payload":{"tag":"li","lines":"128,129"}},{"content":"<strong>Points de ponction</strong> : Surveillance h&#xe9;matome post-coronarographie","children":[],"payload":{"t ant inhibant la coagulation","children":[],"payload":{"tag":"li","lines":"158,159"}},{"content":"<strong>AAP</strong> : Anti-agr&#xe9;gants plaquettaires (ex : aspirine)","children":[],"payload":{"tag":"li","lines":"159,160"}},{"content":"<strong>Amiodarone</strong> : Antiarythmique classe III","children":[],"payload":{"tag":"li","lines":"160,161"}},{"content":"<strong>B&#xea;tabloquants</strong> : Diminuent FC et consommation O&#x2082; myocardique","children":[],"payload":{"tag":"li","lines":"161,162"}},{"content":"<strong>Morphine</strong> : Antalgique opio&#xef;de, r&#xe9;duit douleur et anxi&#xe9;t&#xe9;","children":[],"payload":{"tag":"li","lines":"162,163"}},{"content":"<strong>Diur&#xe9;tiques IV</strong> : Ex : furos&#xe9;mide dans OAP","children":[],"payload":{"tag":"li","lines":"163,164"}},{"content":"<strong>Amines / vasopresseurs</strong> : Noradr&#xe9;naline &#x2191; pression art&#xe9;rielle","children":[],"payload":{"tag":"li","lines":"164,165"}},{"content":"<strong>Inotropes positifs</strong> : Dobutamine &#x2191; contractilit&#xe9;","children":[],"payload":{"tag":"li","lines":"165,167"}}],"payload":{"tag":"h3","lines":"156,157"}},{"content":"&#x1f5e3;&#xfe0f; Expressions professionnelles","children":[{"content":"&#xab; Noradr&#xe9; titr&#xe9;e &#xe0; 0,2 &#xb5;g/kg/min &#xbb; &#x2192; adaptation progressive selon PAM","children":[],"payload":{"tag":"li","lines":"169,170"}},{"content":"&#xab; Bolus d&#x2019;amiodarone &#xbb; &#x2192; dose rapide IV en urgence","children":[],"payload":{"tag":"li","lines":"170,171"}},{"content":"&#xab; Double anti-agr&#xe9;gation &#xbb; &#x2192; aspirine + inhibiteur P2Y12 post-stent","children":[],"payload":{"tag":"li","lines":"171,173"}}],"payload":{"tag":"h3","lines":"167,168"}}],"payload":{"tag":"h2","lines":"154,155"}},{"content":"&#x1f6a8; 7. Urgences vitales","children":[{"content":"<strong>ACR</strong> : Absence d&#x2019;activit&#xe9; circulatoire efficace","children":[],"payload":{"tag":"li","lines":"177,178"}}
