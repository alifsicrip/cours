iur&#xe9;tiques","children":[],"payload":{"tag":"li","lines":"360,361"}}],"payload":{"tag":"li","lines":"356,361"}}],"payload":{"tag":"h3","lines":"350,351"}}],"payload":{"tag":"h2","lines":"326,327"}},{"content":"&#x1f504; <strong>3. REGARDER LA COMPENSATION</strong>","children":[{"content":"\n<p data-lines=\"363,364\">&#x1f449; Le corps tente <strong>toujours de r&#xe9;tablir le pH</strong> en utilisant l&#x2019;autre syst&#xe8;me :</p>","children":[],"payload":{"tag":"li","lines":"363,365"}},{"content":"\n<p data-lines=\"365,367\">&#x1f9ea; trouble m&#xe9;tabolique &#x2192; compensation &#x1f32c;&#xfe0f; respiratoire<br>\n&#x1f449; Les poumons modifient la ventilation pour ajuster le CO&#x2082;</p>","children":[],"payload":{"tag":"li","lines":"365,368"}},{"content":"\n<p data-lines=\"368,370\">&#x1f32c;&#xfe0f; trouble respiratoire &#x2192; compensation &#x1f9ea; r&#xe9;nale<br>\n&#x1f449; Les reins ajustent la r&#xe9;absorption ou l&#x2019;&#xe9;limination des bicarbonates</p>","children":[],"payload":{"tag":"li","lines":"368,371"}},{"content":"\n<p data-lines=\"371,372\">&#x1f4cc; EXEMPLES :</p>","children":[{"content":"\n<p data-lines=\"372,374\">&#x1f9ea; Acidose m&#xe9;tabolique &#x2192; &#x1f32c;&#xfe0f; respiration rapide (&#x2193; CO&#x2082;)<br>\n&#x1f449; Le corps &#x201c;souffle&#x201d; le CO&#x2082; pour diminuer l&#x2019;acidit&#xe9;</p>","children":[],"payload":{"tag":"li","lines":"372,375"}},{"content":"\n<p data-lines=\"375,377\">&#x1f32c;&#xfe0f; Acidose respiratoire &#x2192; &#x1f9ea; reins gardent HCO&#x2083;&#x207b;<br>\n&#x1f449; Les reins augmentent la base pour compenser l&#x2019;acidit&#xe9;</p>","children":[],"payload":{"tag":"li","lines":"375,378"}}],"payload":{"tag":"li","lines":"371,378"}}],"payload":{"tag":"h2","lines":"362,363"}},{"content":"&#x2696;&#xfe0f; <strong>4. &#xc9;VALUER LA COMPENSATION</strong>","children":[{"content":"\n<p data-lines=\"380,381\">&#x274c; pH anormal &#x2192; compensation <strong>incompl&#xe8;te ou absente</strong></p>","children":[],"payload":{"tag":"li","lines":"380,381"}},{"content":"\n<p data-lines=\"381,382\">&#x2705; pH normal &#x2192; compensation <strong>efficace</strong></p>","children":[],"payload":{"tag":"li","lines":"381,383"}},{"content":"\n<p data-lines=\"383,384\">&#x1f449; Attention : m&#xea;me si le pH est normal, il peut exister un <strong>trouble compens&#xe9;</strong></p>","children":[],"payload":{"tag":"li","lines":"383,384"}},{"content":"\n<p data-lines=\"384,385\">&#x1f449; Il faut donc toujours analyser CO&#x2082; et HCO&#x2083;&#x207b;</p>","children":[],"payload":{"tag":"li","lines":"384,386"}}],"payload":{"tag":"h2","lines":"379,380"}},{"content":"&#x1f9e0; &#x1fa84; <strong>M&#xc9;MO EXPRESS</strong>","children":[{"content":"\n<p data-lines=\"388,389\">&#x1f449; &#x1f9ea; HCO&#x2083;&#x207b; = <strong>m&#xe9;tabolique (reins)</strong></p>","children":[],"payload":{"tag":"li","lines":"388,389"}},{"content":"\n<p data-lines=\"389,390\">&#x1f449; &#x1f32c;&#xfe0f; CO&#x2082; = <strong>respiratoire (poumons)</strong></p>","children":[],"payload":{"tag":"li","lines":"389,391"}},{"content":"\n<p data-lines=\"391,392\">&#x1f449; &#x1f4a1; &#x201c;Le pH montre le probl&#xe8;me,</p>","children":[],"payload":{"tag":"li","lines":"391,392"}},{"content":"\n<p data-lines=\"392,393\">et le CO&#x2082; ou HCO&#x2083;&#x207b; montre la cause&#x201d;</p>","children":[],"payload":{"tag":"li","lines":"392,394"}}],"payload":{"tag":"h2","lines":"387,388"}},{"content":"&#x1f3e5; <strong>5. TOUJOURS RELIER AU PATIENT</strong>","children":[{"content":"\n<p data-lines=\"396,397\">&#x1f449; L&#x2019;interpr&#xe9;tation biologique doit toujours &#xea;tre <strong>corr&#xe9;l&#xe9;e &#xe0; la clinique</strong> :</p>","children":[],"payload":{"tag":"li","lines":"396,398"}},{"content":"\n<p data-lines=\"398,400\">&#x1f32c;&#xfe0f; probl&#xe8;me respiratoire &#x2192; penser poumons<br>\n(BPCO, d&#xe9;tresse respiratoire, hypoventilation&#x2026;)</p>","children":[],"payload":{"tag":"li","lines":"398,401"}},{"content":"\n<p data-lines=\"401,403\">&#x1f9ea; probl&#xe8;me m&#xe9;tabolique &#x2192; penser causes syst&#xe9;miques<br>\n(choc, insuffisance r&#xe9;nale, diab&#xe8;te, acidose lactique&#x2026;)</p>","children":[],"payload":{"tag":"li","lines":"401,404"}},{"content":"\n<p data-lines=\"404,405\">&#x1f449; &#x1f3af; Le gaz du sang est un <strong>outil d&#x2019;&#xe9;valuation de la gravit&#xe9;</strong> et d&#x2019;orientation diagnostique, jamais un diagnostic isol&#xe9;</p>","children":[],"payload":{"tag":"li","lines":"404,406"}}],"payload":{"tag":"h2","lines":"395,396"}}],"payload":{"tag":"h1","lines":"311,312"}}]},{"colorFreezeLevel":2,"maxWidth":600,"initialExpandLevel":2})</script>
